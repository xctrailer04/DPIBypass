name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        # List available Xcode versions and pick the latest
        ls /Applications/ | grep Xcode
        XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
        echo "Using: $XCODE_PATH"
        sudo xcode-select -s "$XCODE_PATH"
        xcodebuild -version

    - name: Install xcodegen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: |
        python3 -c "
        content = '''name: DPIBypass
        options:
          bundleIdPrefix: com.voiplet
          deploymentTarget:
            iOS: \"15.0\"

        settings:
          base:
            DEVELOPMENT_TEAM: \"\"
            CODE_SIGN_IDENTITY: \"\"
            CODE_SIGNING_REQUIRED: \"NO\"
            CODE_SIGNING_ALLOWED: \"NO\"

        targets:
          DPIBypass:
            type: application
            platform: iOS
            sources:
              - DPIBypass/
              - Shared/
            settings:
              base:
                PRODUCT_BUNDLE_IDENTIFIER: com.voiplet.dpibypass
                INFOPLIST_FILE: DPIBypass/App/Info.plist
            entitlements:
              path: DPIBypass/DPIBypass.entitlements
            dependencies:
              - target: PacketTunnelExtension
                embed: true

          PacketTunnelExtension:
            type: app-extension
            platform: iOS
            sources:
              - PacketTunnelExtension/
              - Shared/
            settings:
              base:
                PRODUCT_BUNDLE_IDENTIFIER: com.voiplet.dpibypass.tunnel
                INFOPLIST_FILE: PacketTunnelExtension/Info.plist
                HEADER_SEARCH_PATHS:
                  - \"\\$(SRCROOT)/PacketTunnelExtension/lwip\"
                  - \"\\$(SRCROOT)/PacketTunnelExtension/lwip/lwip-src/src/include\"
                SWIFT_OBJC_BRIDGING_HEADER: PacketTunnelExtension/PacketTunnelExtension-Bridging-Header.h
            entitlements:
              path: PacketTunnelExtension/PacketTunnelExtension.entitlements
        '''
        import textwrap
        with open('project.yml', 'w') as f:
            f.write(textwrap.dedent(content))
        "
        xcodegen generate

    - name: Build
      run: |
        xcodebuild -project DPIBypass.xcodeproj \
          -scheme DPIBypass \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/DPIBypass.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Create IPA
      run: |
        mkdir -p build/Payload
        cp -r build/DPIBypass.xcarchive/Products/Applications/DPIBypass.app build/Payload/
        cd build && zip -r ../DPIBypass.ipa Payload/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: DPIBypass-IPA
        path: DPIBypass.ipa
